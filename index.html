<!doctype html>
<html lang="en">
    <head>
      <!-- PWA Meta -->
      <meta charset="UTF-8" />
      <!-- interactive-widget=resizes-content: Android Chrome resizes the layout
           viewport when the keyboard opens, making window.innerHeight shrink.
           This complements the visualViewport JS approach in useKeyboardInset.js.
           viewport-fit=cover is preserved for iOS safe-area inset support. -->
      <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
      <title>JobProfit — Build wealth, not just jobs</title>
      <meta name="apple-mobile-web-app-capable" content="yes" />
      <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
      <meta name="apple-mobile-web-app-title" content="JobProfit" />
      <meta name="mobile-web-app-capable" content="yes" />
      <meta name="theme-color" content="#1DBA63" />

      <!-- Icons -->
      <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png" />
      <link rel="apple-touch-icon" href="/icon-192.png" />

      <!-- Manifest -->
      <link rel="manifest" href="/manifest.json" />

      <!-- Fonts -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap">
    </head>
    <body>
      <!-- No-flash theme init: reads jp.theme from localStorage and sets
           data-theme on <html> synchronously, before React mounts and before
           the browser paints. Runs as a plain script (not module) so it
           executes as early as possible. Falls back to 'dark' (the default). -->
      <script>
        (function () {
          try {
            var pref = localStorage.getItem('jp.theme');
            var valid = ['light', 'dark', 'system'];
            if (!valid.includes(pref)) pref = 'dark';
            var resolved = pref;
            if (pref === 'system') {
              resolved = window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light' : 'dark';
            }
            document.documentElement.dataset.theme = resolved;
          } catch (e) {
            document.documentElement.dataset.theme = 'dark';
          }
        })();
      </script>
      <div id="root"></div>
      <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
