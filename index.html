<!doctype html>
<html lang="en">
    <head>
      <!-- PWA Meta -->
      <meta charset="UTF-8" />
      <!-- interactive-widget=resizes-content: Android Chrome resizes the layout
           viewport when the keyboard opens, making window.innerHeight shrink.
           This complements the visualViewport JS approach in useKeyboardInset.js.
           viewport-fit=cover is preserved for iOS safe-area inset support. -->
      <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
      <title>OHNAR — Run your business. Get paid. Repeat.</title>
      <meta name="apple-mobile-web-app-capable" content="yes" />
      <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
      <meta name="apple-mobile-web-app-title" content="OHNAR" />
      <meta name="mobile-web-app-capable" content="yes" />
      <meta name="theme-color" content="#0B1320" />

      <!-- Icons -->
      <link rel="icon" type="image/png" sizes="96x96" href="/favicon.png" />
      <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

      <!-- iOS PWA launch screens — branded navy + OHNAR lockup on cold start
           (instead of the OS-default blank/soft icon). One per common iPhone
           resolution; iOS picks the exact device match by media query. -->
      <link rel="apple-touch-startup-image" href="/startup/apple-splash-1290-2796.png" media="(device-width:430px) and (device-height:932px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)" />
      <link rel="apple-touch-startup-image" href="/startup/apple-splash-1284-2778.png" media="(device-width:428px) and (device-height:926px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)" />
      <link rel="apple-touch-startup-image" href="/startup/apple-splash-1179-2556.png" media="(device-width:393px) and (device-height:852px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)" />
      <link rel="apple-touch-startup-image" href="/startup/apple-splash-1170-2532.png" media="(device-width:390px) and (device-height:844px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)" />
      <link rel="apple-touch-startup-image" href="/startup/apple-splash-1125-2436.png" media="(device-width:375px) and (device-height:812px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)" />
      <link rel="apple-touch-startup-image" href="/startup/apple-splash-828-1792.png" media="(device-width:414px) and (device-height:896px) and (-webkit-device-pixel-ratio:2) and (orientation:portrait)" />
      <link rel="apple-touch-startup-image" href="/startup/apple-splash-750-1334.png" media="(device-width:375px) and (device-height:667px) and (-webkit-device-pixel-ratio:2) and (orientation:portrait)" />

      <!-- Social / OG -->
      <meta property="og:title" content="OHNAR — Run your business. Get paid. Repeat." />
      <meta property="og:description" content="Run your trade business from your phone — quote, invoice, get paid and know your real profit. Built for UK tradespeople." />
      <meta property="og:image" content="/ohnar-logo.png" />
      <meta property="og:type" content="website" />
      <meta name="twitter:card" content="summary_large_image" />
      <meta name="twitter:image" content="/ohnar-logo.png" />

      <!-- Manifest -->
      <link rel="manifest" href="/manifest.json" />

      <!-- Preload O-ring asset for the PWA install icon — logo-dark.png is no
           longer used on the splash (the ring is now inline SVG). -->
      <link rel="preload" as="image" href="/ohnar-O-transparent-512.png" />

      <!-- Fonts -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&display=swap">
    </head>
    <body>
      <!-- No-flash theme init: reads jp.theme from localStorage and sets
           data-theme on <html> synchronously, before React mounts and before
           the browser paints. Runs as a plain script (not module) so it
           executes as early as possible. Falls back to 'light' (the default).
           Existing users who have a stored preference keep their choice. -->
      <script>
        (function () {
          try {
            var pref = localStorage.getItem('jp.theme');
            var valid = ['light', 'dark', 'system'];
            if (!valid.includes(pref)) pref = 'light';
            var resolved = pref;
            if (pref === 'system') {
              resolved = window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light' : 'dark';
            }
            document.documentElement.dataset.theme = resolved;
          } catch (e) {
            document.documentElement.dataset.theme = 'light';
          }
        })();
      </script>
      <!-- Static branded splash — visible BEFORE the JS bundle loads.
           React removes this when it mounts and replaces with the animated
           <Splash> component. The inline style is intentionally minimal so
           it loads in the first TCP packet; full styles are in index.css.
           Background matches manifest background_color (#0B1320) and
           theme-color meta so the OS launch animation is seamless. -->
      <div id="root"><div id="splash-static" style="position:fixed;inset:0;background:#0B1320;display:flex;flex-direction:row;align-items:center;justify-content:center;gap:4px;z-index:9999"><svg viewBox="0 0 100 100" width="44" height="44" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="display:block;flex-shrink:0"><defs><linearGradient id="ssg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#60A5FA"/><stop offset="100%" stop-color="#2563EB"/></linearGradient></defs><circle cx="50" cy="50" r="40" stroke="rgba(255,255,255,0.08)" stroke-width="11"/><circle cx="50" cy="50" r="40" stroke="url(#ssg)" stroke-width="11" stroke-linecap="round" transform="rotate(-90 50 50)" style="stroke-dasharray:251.3;stroke-dashoffset:0" class="splash-static-arc"/></svg><img src="/ohnar-hnar-white.svg" alt="OHNAR" class="splash-static-wordmark" style="height:26px;width:auto;display:block"/></div></div>
      <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
