<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>JobProfit — Build wealth, not just jobs</title>

  <!-- PWA Meta -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="JobProfit" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1DBA63" />

  <!-- Icons -->
  <link rel="icon" type="image/png" href="/icon-192.png" />
  <link rel="apple-touch-icon" href="/icon-192.png" />

  <!-- Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Preload fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #EDEEF0; overflow-x: hidden; }
    #root { min-height: 100vh; }
    /* Splash screen while JS loads */
    #splash { position: fixed; inset: 0; background: #EDEEF0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; z-index: 9999; }
    #splash .name { font-family: 'DM Sans', sans-serif; font-size: 32px; font-weight: 800; color: #111827; }
    #splash .name span { color: #F59E0B; }
    #splash .sub { font-family: 'DM Sans', sans-serif; font-size: 14px; color: #9CA3AF; }
  </style>
</head>
<body>
  <div id="splash">
    <div class="name">Job<span>Profit</span></div>
    <div class="sub">Loading...</div>
  </div>
  <div id="root"></div>

  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- SheetJS for XLSX export -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

  <!-- App -->
  <script type="text/babel" src="/App.jsx"></script>

  <script>
    // Remove splash once React mounts
    const observer = new MutationObserver(() => {
      const root = document.getElementById('root');
      if (root && root.children.length > 0) {
        const splash = document.getElementById('splash');
        if (splash) splash.style.display = 'none';
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('root'), { childList: true });
  </script>
</body>
</html>
