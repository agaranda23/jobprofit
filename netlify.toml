[build]
  command = "npm run build"
  publish = "dist"

# Brand cutover — jobprofit.co.uk (old domain) → ohnar.co.uk (path-preserving).
# Host-scoped "from" (full URL incl. host) only matches requests to that host,
# so ohnar.co.uk traffic is unaffected. Placed FIRST so it fires ahead of the
# path-only rules below (e.g. /privacy) — otherwise a jobprofit.co.uk/privacy
# request would match the path-only rule and be served locally instead of
# redirecting to ohnar.co.uk.
[[redirects]]
  from = "https://jobprofit.co.uk/*"
  to = "https://ohnar.co.uk/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.jobprofit.co.uk/*"
  to = "https://ohnar.co.uk/:splat"
  status = 301
  force = true

# Legal pages — clean URLs for static HTML in /public.
# Listed BEFORE the SPA catch-all so /privacy, /terms, /cookies resolve to
# their respective HTML files rather than falling through to index.html.
[[redirects]]
  from = "/privacy"
  to   = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to   = "/terms.html"
  status = 200

[[redirects]]
  from = "/cookies"
  to   = "/cookies.html"
  status = 200

# QR channel redirects (card/van/flyer/insta) were moved to public/_redirects.
# netlify.toml [[redirects]] are evaluated AFTER _redirects; the /* catch-all in
# _redirects would have matched first and returned 200, silently breaking attribution.
# Keeping them here would be dead code — they never fire.

# Pay-now redirect — /p/<token> → pay-redirect Netlify function (server-side 302 to Stripe).
# Listed BEFORE the public/_redirects SPA catch-all (/*  /index.html  200) so Netlify
# routes /p/* to the function rather than serving index.html to the browser.
[[redirects]]
  from = "/p/*"
  to   = "/.netlify/functions/pay-redirect"
  status = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"
